<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7209b7" />
      <stop offset="50%" stop-color="#f72585" />
      <stop offset="100%" stop-color="#00f576" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Circle with border -->
  <circle cx="256" cy="256" r="230" fill="#090d16" stroke="url(#grad)" stroke-width="16" />
  
  <!-- Glowing Trophy Design -->
  <g filter="url(#glow)">
    <!-- Trophy main cup -->
    <path d="M190,160 L322,160 L322,230 C322,280 290,310 256,310 C222,310 190,280 190,230 Z" fill="url(#grad)" />
    
    <!-- Trophy base connection -->
    <path d="M256,310 L256,370" stroke="url(#grad)" stroke-width="18" stroke-linecap="round" />
    
    <!-- Trophy base pedestal -->
    <path d="M200,370 L312,370" stroke="url(#grad)" stroke-width="24" stroke-linecap="round" />
    
    <!-- Left Handle -->
    <path d="M190,180 C150,180 150,230 190,240" fill="none" stroke="url(#grad)" stroke-width="10" stroke-linecap="round" />
    
    <!-- Right Handle -->
    <path d="M322,180 C362,180 362,230 322,240" fill="none" stroke="url(#grad)" stroke-width="10" stroke-linecap="round" />
    
    <!-- Shiny Stars -->
    <path d="M256,190 L260,202 L272,203 L263,211 L265,223 L256,216 L247,223 L249,211 L240,203 L252,202 Z" fill="#00f576" />
  </g>
</svg>